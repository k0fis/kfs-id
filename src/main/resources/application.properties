quarkus.http.port=8181

# Database — own kfs_id database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/kfs_id
quarkus.datasource.username=kofis
quarkus.datasource.password=${DB_PASSWORD:changeme}

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.hibernate-orm.database.generation=none

# JWT
kfs.id.jwt.secret=${JWT_SECRET:dev-secret-change-me}
kfs.id.jwt.expiry-days=30
