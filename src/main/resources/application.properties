quarkus.http.port=8181

# Database — shared with kfs-rss
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/kfs_rss
quarkus.datasource.username=kfs_rss
quarkus.datasource.password=${DB_PASSWORD:changeme}

# No schema management — users table owned by kfs-rss Flyway
quarkus.hibernate-orm.database.generation=none

# JWT
kfs.id.jwt.secret=${JWT_SECRET:dev-secret-change-me}
kfs.id.jwt.expiry-days=30
